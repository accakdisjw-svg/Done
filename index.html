<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Done Delivery | مع تم لا تاكل هم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --main-green: #28a745; 
            --dark-bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top, #1a1a1a, #0f0f0f);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .logo-wrapper {
            margin-bottom: 20px;
            position: relative;
        }

        .profile-img {
            width: 150px;
            height: auto;
            /* تم إزالة الخلفية البيضاء والحدود لتناسب اللوغو الشفاف */
            filter: drop-shadow(0 0 10px rgba(40, 167, 69, 0.3));
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        h1 { font-size: 26px; margin: 10px 0; font-weight: bold; letter-spacing: 1px; }
        
        .tagline { 
            font-size: 18px; 
            color: var(--main-green); 
            margin-bottom: 35px;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(40, 167, 69, 0.2);
        }

        .links-container { width: 100%; max-width: 380px; }

        .link-item {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .link-item:active { transform: scale(0.96); }

        .link-item:hover {
            border-color: var(--main-green);
            background: rgba(40, 167, 69, 0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .link-item i { font-size: 24px; margin-left: 15px; color: var(--main-green); }

        .link-item span { font-size: 16px; font-weight: 500; }

        .footer { margin-top: auto; padding-top: 40px; font-size: 12px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <img src="اسم_الصورة_هنا.png" alt="Done Delivery" class="profile-img">
    </div>

    <h1>Done Delivery</h1>
    <div class="tagline">مع تَـــــمّ ، لا تاكل هَـــــمّ ✅</div>

    <div class="links-container">
        <a href="https://www.facebook.com/share/1KigG4MfwV/" class="link-item">
            <i class="fab fa-facebook"></i>
            <span>فيسبوك - Facebook</span>
        </a>

        <a href="https://www.instagram.com/done._.delivery?igsh=czNsNXI5dTJ2MHB4" class="link-item">
            <i class="fab fa-instagram"></i>
            <span>انستغرام - Instagram</span>
        </a>

        <a href="https://whatsapp.com/channel/0029VbCioOJFCCoWIqIMAb3l" class="link-item">
            <i class="fab fa-whatsapp"></i>
            <span>قناة الواتساب - WhatsApp</span>
        </a>
    </div>

    <div class="footer">
        &copy; 2026 Done Delivery - All Rights Reserved
    </div>

</body>
</html>
